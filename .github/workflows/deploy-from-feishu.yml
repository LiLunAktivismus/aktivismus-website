name: Feishu Webhook to GitHub Pages

on:
  repository_dispatch:
    types: [publish_insight]
  workflow_dispatch: # 保留手动运行按钮

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4 # 升级到 v4 消除 Node.js 警告

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5 # 升级到 v5 消除 Node.js 警告
        with:
          python-version: '3.x'

      - name: ⚙️ Run Build Script
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python build_article.py

      - name: 🚀 Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "Auto-publish insight update" || echo "No changes to commit"
          git push
