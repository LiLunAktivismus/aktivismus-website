name: Feishu Webhook to GitHub Pages

# 这里的 event_types 必须和飞书 Webhook JSON 里的名字完全一致
on:
  repository_dispatch:
    types: [publish_insight]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: ⚙️ Run Build Script
        env:
          # 将飞书传过来的数据转成字符串，塞给 Python
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python build_article.py

      - name: 🚀 Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "Auto-publish insight from Feishu: ${{ github.event.client_payload.title }}" || echo "No changes to commit"
          git push
