name: Feishu Webhook to GitHub Pages

on:
  repository_dispatch:
    types: [publish_insight]
  workflow_dispatch: 

# ==========================================
# 核心修复区：赋予 GitHub 机器人写入和推送的权限
permissions:
  contents: write
# ==========================================

# 顺手干掉那个烦人的黄色 Node 警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Run Build Script
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python build_article.py

      - name: 🚀 Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add .
          # 优化后的提交命令：如果发现有新文件才去 commit 和 push
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-publish insight update" && git push)
