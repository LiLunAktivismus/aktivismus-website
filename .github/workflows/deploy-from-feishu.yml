name: Feishu Webhook to GitHub Pages

on:
  repository_dispatch:
    types: [publish_insight]
  workflow_dispatch: 

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Run Build Script
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          # 从 GitHub 保险箱里把飞书钥匙拿出来注入到环境变量中
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          # 安装网络请求库
          pip install requests
          python build_article.py

      - name: 🚀 Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-publish insight update" && git push)
